<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Ismael & Luisa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-sobre" id="contenedorSobre">
        <div class="sobre" id="botonAbrir">
            <img src="Imagenes/Sobreprincipal.png" alt="Sobre Principal" class="sobre-base">
            <img src="Imagenes/solpaApertura.png" alt="Solapa" class="sobre-solapa">
            <div class="texto-click">Click para abrir</div>
        </div>
    </div>

    <div class="contenido-principal" id="contenidoPrincipal">
        <div class="invitacion-box">
            <h1 class="titulo">Ismael & Luisa</h1>
            
            <div class="contenedor-novios">
                <img src="Imagenes/novios.png" alt="Ismael y Luisa" class="foto-novios">
            </div>

            <div class="contador">
                <div class="tiempo-box"><span id="dias">00</span><p>Días</p></div>
                <div class="tiempo-box"><span id="horas">00</span><p>Horas</p></div>
                <div class="tiempo-box"><span id="minutos">00</span><p>Min</p></div>
                <div class="tiempo-box"><span id="segundos">00</span><p>Seg</p></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
