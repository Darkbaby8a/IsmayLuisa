<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismael & Luisa - Nuestra Boda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-sobre" id="contenedorSobre">
        <div class="sobre" id="botonAbrir">
            <img src="Imagenes/Sobreprincipal.png" alt="Sobre" class="sobre-base">
            <img src="Imagenes/solpaApertura.png" alt="Solapa" class="sobre-solapa">
            <div class="texto-click">Toca para abrir la invitación</div>
        </div>
    </div>

    <main class="seccion-invitacion" id="contenidoInvitacion">
        
        <div class="mi-seccion-carrusel">
            <div class="capa-overlay">
        <img src="Imagenes/sello.png" alt="Sello de boda" class="sello-boda">
        <h1 class="nombres-boda">Ismael & Luisa</h1>
        <p class="fecha-boda">11 de Octubre 2026</p>
    </div>
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <figure><img src="Imagenes/novios.png" alt="FORMATOCARRUSEL2"></figure>
                    </div>
                    <div class="swiper-slide">
                        <figure><img src="Imagenes/novios.png" alt="FORMATOCARRUSEL1"></figure>
                    </div>
                    <div class="swiper-slide">
                        <figure><img src="Imagenes/novios.png" alt="FORMATOCARRUSEL7"></figure>
                    </div>
                    <div class="swiper-slide">
                        <figure><img src="Imagenes/novios.png" alt="FORMATOCARRUSEL8"></figure>
                    </div>
                    <div class="swiper-slide">
                        <figure><img src="Imagenes/novios.png" alt="FORMATOCARRUSEL3"></figure>
                    </div>
                    <div class="swiper-slide">
                        <figure><img src="Imagenes/novios.png" alt="FORMATOCARRUSEL4"></figure>
                    </div>
                </div>
            </div>
        </div>

    </main>
    <section class="seccion-frase">
    <div class="contenedor-frase">
        <div class="frase-animada retraso-1">
            <img src="Imagenes/divisor.png" alt="Adorno superior" class="divisor-boda">
        </div>

        <div class="frase-animada retraso-2">
            <blockquote class="frase-contenido">
                "El amor nos unió para siempre y <br>queremos compartir este gran día contigo"
            </blockquote>
        </div>

        <div class="frase-animada retraso-1">
            <img src="Imagenes/divisor.png" alt="Adorno inferior" class="divisor-boda divisor-invertido">
        </div>
    </div>
</section>
    <section class="seccion-savethedate" id="savethedate">
    <img src="Imagenes/boda-sarah-y-rodrigo-1-1.png" alt="Decoración izquierda" class="decoracion-lateral izq">
    <img src="Imagenes/boda-sarah-y-rodrigo-1-1.png" alt="Decoración derecha" class="decoracion-lateral der">

    <div class="contenedor-contador">
        <h2 class="titulo-contador animacion-subir">HASTA EL GRAN DÍA</h2>
        
        <div class="reloj-regresivo animacion-bajar" id="timer">
            <div class="tiempo-item">
                <span class="digitos" id="dias">00</span>
                <span class="etiqueta">Días</span>
            </div>
            <div class="tiempo-item">
                <span class="digitos" id="horas">00</span>
                <span class="etiqueta">Hrs</span>
            </div>
            <div class="tiempo-item">
                <span class="digitos" id="minutos">00</span>
                <span class="etiqueta">Min</span>
            </div>
            <div class="tiempo-item">
                <span class="digitos" id="segundos">00</span>
                <span class="etiqueta">Seg</span>
            </div>
        </div>

        <h2 class="fecha-texto animacion-fade">11 de Octubre 2026</h2>

        <div class="contenedor-boton animacion-subir">
            <a class="btn-savethedate" href="https://calendar.google.com/calendar/u/0/share?slt=1AXpMJub4Gjp38z5k5AQoHMvs5vTZWNwSEM4Gf7Ite57EZlXgQwdNi1lI9lPkM03KcTA9AmzL9hoUCw" target="_blank" rel="nofollow noopener">
                SAVE THE DATE
            </a>
        </div>
    </div>
</section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
