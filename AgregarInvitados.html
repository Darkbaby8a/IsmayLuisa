<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Boda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Montserrat', sans-serif;
            color: #000000;
            padding: 40px 20px;
        }

        .contenedor-admin {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Encabezado Principal */
        .header-admin {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid #ece7e5;
            padding-bottom: 30px;
        }

        .header-admin h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #7A1632;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .header-admin p {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Distribución de la pantalla: Formulario a la izquierda, Tabla a la derecha */
        .layout-admin {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .columna-formulario {
            flex: 1;
            position: sticky;
            top: 20px;
            background: #ffffff;
            border: 1px solid rgba(122, 22, 50, 0.15);
            padding: 35px;
            box-shadow: 0 10px 30px rgba(122, 22, 50, 0.02);
        }

        .columna-formulario::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #7A1632;
        }

        .columna-formulario h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #000000;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .columna-tabla {
            flex: 2;
        }

        /* Tarjetas de Indicadores Rápidos */
        .resumen-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            background: #ffffff;
            border: 1px solid #ece7e5;
            padding: 20px;
            text-align: center;
        }

        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7A1632;
            margin-bottom: 5px;
        }

        .card .numero {
            font-size: 2rem;
            font-weight: 700;
            color: #000000;
        }

        /* Formulario e Inputs */
        .formulario-boda {
            width: 100%;
        }

        .grupo-formulario {
            margin-bottom: 20px;
        }

        .fila-formulario {
            display: flex;
            gap: 15px;
        }

        .fila-formulario .grupo-formulario {
            flex: 1;
        }

        .label-boda {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #7A1632;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .input-boda {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: 1px solid #ece7e5;
            border-radius: 0px;
            padding: 14px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-boda:focus {
            outline: none;
            border-color: #7A1632;
            box-shadow: 0 4px 12px rgba(122, 22, 50, 0.05);
        }

        .input-boda::placeholder {
            color: #b5b5b5;
            font-weight: 300;
        }

        .btn-modal-principal {
            width: 100%;
            background: #7A1632;
            color: #ffffff;
            border: 1px solid #7A1632;
            border-radius: 0px;
            padding: 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: .3s;
            margin-top: 10px;
        }

        .btn-modal-principal:hover {
            background: #5b1025;
            border-color: #5b1025;
            transform: translateY(-2px);
        }

        /* Tabla de Control de Invitados */
        .tabla-contenedor {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #ece7e5;
        }

        .tabla-invitados {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        .tabla-invitados thead {
            background: #7A1632;
            color: #ffffff;
        }

        .tabla-invitados th {
            padding: 16px 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .tabla-invitados td {
            padding: 16px 20px;
            border-bottom: 1px solid #ece7e5;
            color: #000000;
        }

        .tabla-invitados tr:hover {
            background: rgba(122, 22, 50, 0.02);
        }

        .badge-url {
            font-family: monospace;
            background: #faf9f8;
            padding: 4px 8px;
            border: 1px solid #ece7e5;
            font-size: 0.8rem;
            color: #555;
        }

        .cargando {
            text-align: center;
            padding: 40px;
            font-style: italic;
            color: #888;
        }

        /* Diseño Responsivo */
        @media (max-width: 900px) {
            .layout-admin {
                flex-direction: column;
            }

            .columna-formulario {
                position: static;
                width: 100%;
            }

            .columna-tabla {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .fila-formulario {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>

<body>

    <div class="contenedor-admin">

        <header class="header-admin">
            <h1>Panel de Control de Asistencia</h1>
            <p>Gestión interna de invitados confirmados</p>
        </header>

        <div class="layout-admin">

            <!-- COLUMNA IZQUIERDA: FORMULARIO DE ALTA -->
            <div class="columna-formulario">
                <h2>Agregar Invitado</h2>

                <form id="formConfirmarBoda" class="formulario-boda">
                    <div class="grupo-formulario">
                        <label for="familiaDesc" class="label-boda">Invitado / Familia</label>
                        <input type="text" id="familiaDesc" name="familiaDesc" class="input-boda"
                            placeholder="Ej. Familia Martínez López" required>
                    </div>

                    <div class="fila-formulario">
                        <div class="grupo-formulario">
                            <label for="mesa" class="label-boda">Mesa Asignada</label>
                            <input type="text" id="mesa" name="mesa" class="input-boda" placeholder="Ej. Mesa 4 o VIP"
                                required>
                        </div>

                        <div class="grupo-formulario">
                            <label for="pases" class="label-boda">Número de Pases</label>
                            <input type="number" id="pases" name="pases" class="input-boda" min="1" max="10"
                                placeholder="Ej. 2" required>
                        </div>
                    </div>

                    <button type="submit" id="btnConfirmarModal" class="btn-modal-principal">Registrar
                        Asistencia</button>
                </form>
            </div>

            <!-- COLUMNA DERECHA: MÉTRICAS Y TABLA -->
            <div class="columna-tabla">

                <div class="resumen-cards">
                    <div class="card">
                        <h3>Familias / Grupos</h3>
                        <div class="numero" id="txtTotalFamilias">0</div>
                    </div>
                    <div class="card">
                        <h3>Total Pases</h3>
                        <div class="numero" id="txtTotalPases">0</div>
                    </div>
                </div>

                <div class="tabla-contenedor">
                    <table class="tabla-invitados">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Invitado / Familia</th>
                                <th>Mesa</th>
                                <th>Pases</th>
                                <th>Identificador URL</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpo">
                            <tr>
                                <td colspan="5" class="cargando">Cargando lista de asistencia...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </div>

    <!-- SCRIPT DE CONTROL INTEGRADO -->
    <script>
        const tbody = document.getElementById("tablaCuerpo");
        const txtFamilias = document.getElementById("txtTotalFamilias");
        const txtPases = document.getElementById("txtTotalPases");
        const formBoda = document.getElementById('formConfirmarBoda');

        // Función para cargar y actualizar la tabla desde la BD
        function cargarInvitados() {
            fetch("/.netlify/functions/ObtenerInvitados")
                .then(response => {
                    if (!response.ok) throw new Error("Error al obtener los datos.");
                    return response.json();
                })
                .then(res => {
                    txtFamilias.textContent = res.totalInvitados;
                    txtPases.textContent = res.totalPases;
                    tbody.innerHTML = "";

                    if (res.data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px;">Aún no hay confirmaciones registradas.</td></tr>`;
                        return;
                    }

                    res.data.forEach(invitado => {
                        const fila = document.createElement("tr");
                        fila.innerHTML = `
                            <td><strong>#${invitado.id}</strong></td>
                            <td>${invitado.FamiliaDesc}</td>
                            <td>${invitado.Mesa}</td>
                            <td><strong>${invitado.Pases}</strong></td>
                            <td><span class="badge-url">${invitado.familiaNombre}</span></td>
                        `;
                        tbody.appendChild(fila);
                    });
                })
                .catch(err => {
                    console.error(err);
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:30px;">Error al cargar datos.</td></tr>`;
                });
        }

        // Evento al enviar el formulario (Envía datos al backend y refresca la tabla)
        formBoda.addEventListener('submit', (e) => {
            e.preventDefault();

            const btnSubmit = document.getElementById('btnConfirmarModal');
            btnSubmit.textContent = "Procesando...";
            btnSubmit.disabled = true;

            const datos = {
                FamiliaDesc: document.getElementById('familiaDesc').value,
                Mesa: document.getElementById('mesa').value,
                Pases: parseInt(document.getElementById('pases').value, 10)
            };

            fetch('/.netlify/functions/AgregarInvitado', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
                .then(response => {
                    if (!response.ok) throw new Error('Error en el servidor');
                    return response.json();
                })
                .then(data => {
                    formBoda.reset();
                    cargarInvitados(); // Refresca la lista automáticamente sin recargar la página
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('No se pudo registrar al invitado.');
                })
                .finally(() => {
                    btnSubmit.textContent = "Registrar Asistencia";
                    btnSubmit.disabled = false;
                });
        });

        // Cargar la lista al abrir el panel por primera vez
        document.addEventListener("DOMContentLoaded", cargarInvitados);
    </script>
</body>

</html>
